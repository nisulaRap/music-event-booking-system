server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # AWS VPC DNS resolver - defers upstream DNS resolution to request time
    resolver 169.254.169.253 valid=10s ipv6=off;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/auth {
        set $backend user-service;
        proxy_pass http://$backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/users {
        set $backend user-service;
        proxy_pass http://$backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/events {
        set $backend event-service;
        proxy_pass http://$backend:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/bookings {
        set $backend booking-service;
        proxy_pass http://$backend:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/payments {
        set $backend payment-service;
        proxy_pass http://$backend:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/notifications {
        set $backend notification-service;
        proxy_pass http://$backend:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}