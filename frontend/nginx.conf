server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/auth          { proxy_pass http://user-service:8081;          proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/users         { proxy_pass http://user-service:8081;          proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/events        { proxy_pass http://event-service:8082;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/bookings      { proxy_pass http://booking-service:8083;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/payments      { proxy_pass http://payment-service:8084;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/notifications { proxy_pass http://notification-service:8085;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    location / { try_files $uri $uri/ /index.html; }