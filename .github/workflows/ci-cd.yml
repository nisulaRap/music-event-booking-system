name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - Development

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Build All Spring Boot Services
      - name: Build User Service
        working-directory: ./user-service
        run: mvn clean package -DskipTests

      - name: Build Event Service
        working-directory: ./event-service
        run: mvn clean package -DskipTests

      - name: Build Booking Service
        working-directory: ./booking-service
        run: mvn clean package -DskipTests

      - name: Build Payment Service
        working-directory: ./payment-service
        run: mvn clean package -DskipTests

      - name: Build Notification Service
        working-directory: ./notification-service
        run: mvn clean package -DskipTests

      # Set up Node.js for Frontend
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push Docker Images

      - name: Build and Push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      - name: Build and Push Event Service
        uses: docker/build-push-action@v5
        with:
          context: ./event-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/event-service:latest

      - name: Build and Push Booking Service
        uses: docker/build-push-action@v5
        with:
          context: ./booking-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/booking-service:latest

      - name: Build and Push Payment Service
        uses: docker/build-push-action@v5
        with:
          context: ./payment-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/payment-service:latest

      - name: Build and Push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/notification-service:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      - name: Confirm Images Pushed
        run: |
          echo "   All images pushed to Docker Hub:"
          echo "   ${{ secrets.DOCKER_USERNAME }}/user-service:latest"
          echo "   ${{ secrets.DOCKER_USERNAME }}/event-service:latest"
          echo "   ${{ secrets.DOCKER_USERNAME }}/booking-service:latest"
          echo "   ${{ secrets.DOCKER_USERNAME }}/payment-service:latest"
          echo "   ${{ secrets.DOCKER_USERNAME }}/notification-service:latest"
          echo "   ${{ secrets.DOCKER_USERNAME }}/frontend:latest"