spring.application.name=booking-service
server.port=8083
 
spring.data.mongodb.uri=${MONGO_URI_BOOKING}

spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=${JWT_SECRET}

event.service.url=${EVENT_SERVICE_URL:http://event-service:8082}
user.service.url=${USER_SERVICE_URL:http://user-service:8081}
payment.service.url=${PAYMENT_SERVICE_URL:http://payment-service:8084}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://notification-service:8085}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html